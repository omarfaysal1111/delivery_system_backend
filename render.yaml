services:
  - type: web
    name: delivery-system-api
    runtime: docker
    plan: free
    envVars:
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        sync: false
      - key: DB_NAME
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: REDIS_URL
        fromService:
          type: redis
          name: delivery-redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: JAVA_OPTS
        value: "-Xmx400m -Xms200m"

  - type: redis
    name: delivery-redis
    plan: free
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []